<h2>Eventos</h2>
<hr>
<form action="" class="form-inline">
  <div class="form-group mb-2">
    <label class="mr-2">Filtro:</label>
    <input [(ngModel)]="listFilter" name='filtro' type="text" class="form-control mr-2" placeholder="buscar...">
  </div>
</form>
<table class="table table-stripped">
  <thead class="thead-dark">
    <tr>
      <th><button type="button" class="btn btn-outline-light btn-sm" (click)="showImage()">
          {{ !showImg ? 'Exibir' : 'Ocultar'}}</button></th>
      <th>#</th>
      <th>Tema</th>
      <th>Local</th>
      <th>Data</th>
      <th>Qtd pessoas</th>
      <th>Lote</th>
      <th>Opções</th>
    </tr>
  </thead>
  <tbody *ngIf="eventos && eventos.length">
    <tr *ngFor="let evento of eventosFiltrados; index as i">
      <td>
        <img [collapse]=!showImg [isAnimated]="true" src="assets/{{evento.imageURL}}" alt="Evento"
          [style.width.px]="widthImg" [style.margin.px]="marginImg">
      </td>
      <td>{{evento.eventoId}}</td>
      <td>{{evento.tema}}</td>
      <td>{{evento.local}}</td>
      <td>{{evento.dataEvento}}</td>
      <td>{{evento.qtdPessoas}}</td>
      <td>{{evento.lote}}</td>
      <td>
        <button type="button" class="btn btn-primary btn-sm mr-2">Editar</button>
        <button type="button" class="btn btn-danger btn-sm">Excluir</button>
      </td>
    </tr>
  </tbody>
  <tfoot class="text-center" *ngIf=!eventos.length>
    <td colspan=8>
      <h4>Nenhum evento encontrado!</h4>
    </td>
  </tfoot>
</table>
